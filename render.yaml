services:
  - type: web
    name: wellness-monitor-api
    runtime: python
    rootDir: server
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python servercopy.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DB
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: wellness-monitor-web
    runtime: static
    rootDir: depression-app
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: VITE_API_HOST
        fromService:
          type: web
          name: wellness-monitor-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
